[tool.black]
line-length = 88
target-version = ["py313"]
include = "\\.pyi?$"
extend-exclude = """
/(\.venv|dataset|processed_dataset|test_output)/
"""

[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = [".venv", "dataset", "processed_dataset", "test_output"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
